<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B站话题分析</title>
  <meta name="base-path" content="{{ base_path }}" />
  <link rel="stylesheet" href="{{ base_path }}/static/app.css?v={{ app_version }}" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-text">
        <p class="eyebrow">Bilibili Topic Analyzer</p>
        <h1>B站近期话题分析</h1>
        <p class="subtitle">输入搜索关键词，抓取 B 站搜索结果中的近期视频，并由 LLM 生成趋势报告</p>
      </div>
      <div class="hero-badge">Powered by LLM</div>
    </header>

    <main class="workspace">
      <section class="results-column">
        <div id="results-empty" class="panel empty-state">
          <h2>分析结果</h2>
          <p>在右侧填写配置并点击「开始分析」，报告与视频样本将显示在这里。</p>
        </div>

        <div id="results-content" class="results hidden">
          <div class="panel">
            <div class="panel-head panel-head-stack">
              <h2 id="result-title">分析报告</h2>
              <div id="result-meta" class="meta"></div>
            </div>
            <div id="report" class="report markdown-body"></div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>视频样本</h2>
              <span id="video-count" class="meta"></span>
            </div>
            <div id="video-list" class="video-list"></div>
          </div>
        </div>
      </section>

      <aside class="config-column">
        <section class="panel config-panel">
          <h2 class="config-title">配置</h2>
          <form id="analyze-form">
            <details class="llm-panel" id="llm-panel" open>
              <summary>LLM 配置 <span class="hint">（保存在浏览器本地）</span></summary>
              <div class="llm-fields">
                <label class="field">
                  <span>API Key</span>
                  <input id="llm-api-key" name="llm_api_key" type="password" placeholder="sk-..." autocomplete="off" required />
                </label>
                <label class="field">
                  <span>Base URL</span>
                  <input id="llm-base-url" name="llm_base_url" type="url" value="https://api.openai.com/v1" placeholder="https://api.deepseek.com/v1" required />
                </label>
                <label class="field">
                  <span>模型</span>
                  <input id="llm-model" name="llm_model" type="text" value="gpt-4o-mini" placeholder="deepseek-chat" required />
                </label>
                <p class="field-hint">Key 仅保存在本机浏览器，不会写入服务器。</p>
              </div>
            </details>

            <label class="field">
              <span>搜索关键词</span>
              <input id="keyword" name="keyword" type="text" placeholder="如：AI绘画、原神、考研" required />
            </label>

            <label class="field">
              <span>回溯天数</span>
              <input id="days" name="days" type="number" min="1" max="90" value="30" />
            </label>

            <label class="field">
              <span>样本数量</span>
              <input id="limit" name="limit" type="number" min="5" max="80" value="25" />
            </label>

            <label class="field">
              <span>最低播放量</span>
              <input id="min-play" name="min_play" type="number" min="0" step="1000" value="10000" />
              <p class="field-hint">默认 1 万；填 0 表示不限制播放量。</p>
            </label>

            <p class="field-hint">搜索采用 B 站综合排序。</p>

            <button id="submit-btn" type="submit">开始分析</button>
          </form>

          <div id="status" class="status hidden">
            <div class="spinner"></div>
            <p id="status-text">正在分析...</p>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script>window.BASE_PATH = {{ base_path_json }};</script>
  <script src="{{ base_path }}/static/app.js?v={{ app_version }}"></script>
</body>
</html>
